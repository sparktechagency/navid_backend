name: Deploy Backend to EC2

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20"

      - name: Install dependencies
        run: npm install

      - name: Build project
        run: npm run build

      - name: Ensure dist exists
        run: |
          if [ ! -d dist ]; then
            echo "dist folder missing. Build failed."
            exit 1
          fi

      - name: Create backend archive
        run: tar czf backend.tar.gz src/ dist/ package.json package-lock.json

      - name: Upload backend artifact
        uses: actions/upload-artifact@v4
        with:
          name: backend-build
          path: backend.tar.gz

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - name: Download backend artifact
        uses: actions/download-artifact@v4
        with:
          name: backend-build

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload to EC2
        env:
          EC2_USER: ${{ secrets.SERVER_USER }}
          EC2_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          scp backend.tar.gz $EC2_USER@$EC2_HOST:~/applications/backend/

      - name: Deploy on EC2
        env:
          EC2_USER: ${{ secrets.SERVER_USER }}
          EC2_HOST: ${{ secrets.SERVER_HOST }}
        run: |
          ssh $EC2_USER@$EC2_HOST << 'EOF'
            set -e
            cd ~/applications/backend

            tar xzf backend.tar.gz
            rm backend.tar.gz

            npm install --omit=dev

            pm2 delete backend || true
            pm2 start dist/index.js --name backend

            pm2 save
          EOF
