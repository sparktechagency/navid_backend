name: Deploy Node.js with TypeScript on EC2

on:
  push:
    branches:
      - "main"
  pull_request:
    branches:
      - "main"

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.15"

      - name: Install Dependencies
        run: npm install --frozen-lockfile

      - name: Install TypeScript Compiler
        run: npm install -g typescript

      - name: Build Project
        run: npm run build

      - name: Verify build output
        run: |
          if [ ! -d dist ]; then
            echo "Error: dist/ folder not found. Make sure npm run build creates dist/"
            exit 1
          fi

      - name: Compress backend for deployment
        run: |
          tar czf backend.tar.gz src/ package.json package-lock.json dist/

  deploy:
    runs-on: ubuntu-latest
    needs: build

    steps:
      - uses: actions/checkout@v3

      - name: Set up Node.js
        uses: actions/setup-node@v3
        with:
          node-version: "20.15"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SERVER_SSH_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$SSH_PRIVATE_KEY" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_HOST }} >> ~/.ssh/known_hosts

      - name: Upload backend to EC2
        env:
          EC2_HOST: ${{ secrets.SERVER_HOST }}
          EC2_USER: ${{ secrets.SERVER_USER }}
        run: |
          scp backend.tar.gz $EC2_USER@$EC2_HOST:~/applications/backend/

      - name: Deploy backend on EC2
        env:
          EC2_HOST: ${{ secrets.SERVER_HOST }}
          EC2_USER: ${{ secrets.SERVER_USER }}
          ENV_VARS_JSON: ${{ secrets.ENV_VARS_JSON }}
        run: |
          ssh $EC2_USER@$EC2_HOST << 'EOF'
            set -e  # Stop on any error

            # Create application directory if it doesn't exist
            mkdir -p ~/applications/backend
            cd ~/applications/backend

            # Extract backend archive
            tar xzf backend.tar.gz
            rm backend.tar.gz

            # Install production dependencies
            npm install --frozen-lockfile --production

            # Write environment variables
            echo "$ENV_VARS_JSON" > .env

            # Stop existing PM2 process if exists
            pm2 delete backend || true

            # Stop existing tmux session if exists
            tmux has-session -t backend 2>/dev/null && tmux kill-session -t backend || true

            # Start backend in a detached tmux session
            tmux new-session -d -s backend 'node dist/index.js'

            echo "Deployment completed successfully"
          EOF
